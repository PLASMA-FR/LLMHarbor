<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">LLMHarbor anchor mark</title>
  <desc id="desc">A compact anchor-shaped logo for LLMHarbor, drawn as a monoline harbor anchor with a routed signal notch.</desc>
  <defs>
    <linearGradient id="sea" x1="12" y1="6" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6FE7D4"/>
      <stop offset="0.54" stop-color="#2BA89B"/>
      <stop offset="1" stop-color="#D4A94E"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="17" fill="#071514"/>
  <path d="M12 42c4.7 9 11.4 13.5 20 13.5S47.3 51 52 42" fill="none" stroke="#1A3632" stroke-width="10" stroke-linecap="round"/>
  <g filter="url(#glow)" fill="none" stroke="url(#sea)" stroke-width="5.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="32" cy="13.5" r="5.5"/>
    <path d="M32 19v31"/>
    <path d="M21.5 28h21"/>
    <path d="M14 40.5c3.8 8.4 9.8 12.6 18 12.6s14.2-4.2 18-12.6"/>
    <path d="M14 40.5l9.5-1.8"/>
    <path d="M50 40.5l-9.5-1.8"/>
  </g>
  <path d="M38.8 24.3h7.7l-6.1 7.2h7.2" fill="none" stroke="#F0D88A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
</svg>
