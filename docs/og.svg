<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">LLMHarbor</title>
  <desc id="desc">LLMHarbor brand card with anchor-shaped logo and unified LLM routing message.</desc>
  <defs>
